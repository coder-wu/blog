          <p>乱码类似这样的：╫╩┴╧╖┤╤▌▓т╒╛╦┘╢╚│</p>
<p>因为zip文件对文件名的编码默认为当前环境的locale，所以在windows下压缩的zip文件，在linux下解压便会乱码。</p>
<p>在解压时，加上一个参数-O</p>
<p>unzip -O CP936 filename.zip</p>
