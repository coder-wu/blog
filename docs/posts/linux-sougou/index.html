          <div class="post-content markdown-body">
            <p>有些时候Ubuntu的搜狗输入法在一些软件中无法调出使用</p>

<p>解决方法：</p>

<p>测试可用</p>

<p>1.杀死fcitx重新启动</p>

<p>$ sudo killall fcitx</p>

<p>$ fcitx</p>

<p>2.启动搜狗输入法</p>

<p>$ sogou-qimpanel</p>

<p>执行命令时若遇到错误提醒，长时间停顿可ctrl+c退出执行下一条命令，最后也能解决问题。</p>
